audio:
  device: null          # null = system default; or device index/name
  sample_rate: 44100
  channels: 1
  loop_interval: 0      # seconds between cycles (0 = no sleep)
  listeners:            # snapshots at 5s, full recording at 10s
    - snippet_duration: 5
    - snippet_duration: 10

discogs:
  consumer_key: "YOUR_KEY_HERE"
  consumer_secret: "YOUR_SECRET_HERE"
  enabled: true         # set false to skip Discogs enrichment

server:
  host: "0.0.0.0"
  port: 8080
