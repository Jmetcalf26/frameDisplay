audio:
  device: null          # null = system default; or device index/name
  sample_rate: 44100
  channels: 1
  listeners:            # multiple listeners run in parallel
    - snippet_duration: 5   # fast listener
      loop_interval: 10
    - snippet_duration: 10  # deep listener for harder matches
      loop_interval: 15

discogs:
  consumer_key: "YOUR_KEY_HERE"
  consumer_secret: "YOUR_SECRET_HERE"
  enabled: true         # set false to skip Discogs enrichment

server:
  host: "0.0.0.0"
  port: 8080
