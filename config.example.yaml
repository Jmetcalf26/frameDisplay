logging:
  # Path to write logs to (relative to project root, or absolute).
  # Set to null to log only to stdout.
  file: "log.txt"
  level: "INFO"             # DEBUG, INFO, WARNING, ERROR

audio:
  device: null          # null = system default; or device index/name
  sample_rate: 44100
  channels: 1
  loop_interval: 0      # seconds between cycles (0 = no sleep)
  listeners:            # snapshots at 5s, full recording at 10s
    - snippet_duration: 5
    - snippet_duration: 10

discogs:
  consumer_key: "YOUR_KEY_HERE"
  consumer_secret: "YOUR_SECRET_HERE"
  enabled: true         # set false to skip Discogs enrichment

acoustid:
  enabled: false              # set true to enable the Chromaprint fallback
  api_key: "YOUR_KEY_HERE"    # register at https://acoustid.org/api-key
  min_score: 0.5              # reject matches below this confidence (0-1)

tv:
  enabled: true
  host: "192.168.1.100"
  port: 8002
  token_file: "cache/tv-token.txt"   # relative to project root, or absolute
  # Matte style the Frame applies around uploaded art; "none" disables it.
  matte: "none"
  portrait_matte: "none"

display:
  orientation: "landscape"    # "landscape" or "portrait"
  composed_dir: "cache/composed"  # where composed JPEGs are written/cached
  # Background behind the album art and text. One of:
  #   "black"      — solid black (default)
  #   "white"      — solid white
  #   "auto"       — average color of the entire album image
  #   "corners"    — average of the four corner pixels of the album image
  #   "mode"       — most common (dominant) color in the album image
  #   "blur"       — heavily blurred copy of the album art fills the canvas
  #   "#rrggbb"    — explicit hex color
  # Changing this invalidates the composed-image cache automatically.
  background: "black"
  # Font family for the title/artist text. One of:
  #   "sans"  — sans-serif (DejaVu Sans Bold / Helvetica / Arial)
  #   "serif" — serif (DejaVu Serif Bold / Georgia / Times New Roman)
  #   "mono"  — monospace (DejaVu Sans Mono Bold / Menlo / Courier New)
  # Changing this also invalidates the composed-image cache.
  font: "sans"

preview:
  enabled: true               # false = no HTTP server at all (headless)
  host: "0.0.0.0"
  port: 8080

cache:
  enabled: true
  path: "cache/tracks.json"   # relative to project root, or absolute
  max_bytes: 524288           # 512 KB; oldest entries evicted when exceeded

image_cache:
  enabled: true
  dir: "cache/images"         # relative to project root, or absolute
  max_bytes: 104857600        # 100 MB; oldest album images evicted when exceeded
